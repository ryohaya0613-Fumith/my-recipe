<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自炊ルーレット</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="sticky-header">
        <div id="main-header" class="header">
            <h1>自炊ルーレット</h1>
            <div class="header-btns">
                <button class="memo-trigger-btn" onclick="showMemoView()">🛒 買い物メモ</button>
                <button class="roulette-trigger-btn" onclick="openRoulette()">🎲 ルーレット</button>
                <button class="nav-btn" onclick="toggleForm()">＋ 追加</button>
            </div>
        </div>

        <div id="filter-section" class="filter-area">
            <div class="filter-row-top">
                <select id="filter-tier" onchange="renderList()">
                    <option value="">すべてのTier</option>
                    <option value="1">Tier 1</option>
                    <option value="2">Tier 2</option>
                    <option value="3">Tier 3</option>
                </select>
                <select id="filter-meat" onchange="renderList()">
                    <option value="">すべての肉</option>
                    <option value="豚">豚</option>
                    <option value="鶏">鶏</option>
                    <option value="ひき肉">ひき肉</option>
                    <option value="その他">その他</option>
                </select>
                <label class="fav-filter">
                    <input type="checkbox" id="filter-fav" onchange="renderList()"> ☆のみ
                </label>
            </div>
            <div class="filter-row-sort">
                <button id="sort-btn" class="sort-btn" onclick="toggleSort()">📊 回数順に並び替え: 標準</button>
                <button id="clear-btn" class="clear-btn" onclick="clearFilters()">✖ クリア</button>
            </div>
        </div>
    </div>

    <div id="list-view">
        <div id="recipe-list" class="recipe-list"></div>
    </div>

    <div id="memo-view" class="card" style="display: none;">
        <div class="detail-nav">
            <button class="back-btn" onclick="showList()">← 戻る</button>
        </div>
        <h2 style="text-align: center; margin-bottom: 20px;">🛒 買い物メモ</h2>
        
        <div id="memo-empty-msg" style="text-align: center; color: #888; margin: 40px 0;">
            まだ何も追加されていません
        </div>

        <div id="memo-content" style="display: none;">
            <div class="ingredients-box">
                <strong class="section-title-ing">必要な材料一覧</strong>
                <ul id="memo-aggregated-ingredients" class="memo-ing-list"></ul>
            </div>
            
            <div style="margin-top: 30px;">
                <strong>追加したレシピ</strong>
                <div id="memo-recipe-list" class="memo-recipe-items"></div>
            </div>
        </div>
    </div>

    <div id="form-view" class="card">
        <h2 id="form-title">レシピを追加</h2>
        <input type="hidden" id="entry-id">
        <input type="text" id="input-title" placeholder="料理名">
        <div class="select-group">
            <select id="input-tier">
                <option value="">Tierを選択</option>
                <option value="1">Tier 1</option>
                <option value="2">Tier 2</option>
                <option value="3">Tier 3</option>
            </select>
            <select id="input-meat">
                <option value="">肉タグを選択</option>
                <option value="豚">豚</option>
                <option value="鶏">鶏</option>
                <option value="ひき肉">ひき肉</option>
                <option value="その他">その他</option>
            </select>
        </div>
        <textarea id="input-ingredients" placeholder="主な食材（、で区切る）"></textarea>
        <div class="seasoning-input-area">
            <strong>調味料（グループごと）</strong>
            <div id="seasoning-groups"></div>
            <button type="button" class="add-sub-btn" onclick="addSeasoningGroup()">＋ 調味料グループを追加</button>
        </div>
        <textarea id="input-steps" placeholder="手順（改行で番号がつきます）" rows="5"></textarea>
        <textarea id="input-memo" placeholder="備考・メモ"></textarea>
        <button class="save-btn" onclick="saveRecipe()">保存する</button>
        <button class="cancel-btn" onclick="closeForm()">キャンセル</button>
    </div>

    <div id="detail-view" class="card">
        <div class="detail-nav">
            <button class="back-btn" onclick="showList()">← 戻る</button>
            <div class="detail-btns-right">
                <button id="detail-memo-btn" class="memo-add-btn" onclick="addToMemoFromDetail()">メモに追加</button>
                <button class="edit-btn" onclick="openEdit()">編集</button>
            </div>
        </div>
        <div class="detail-header-row">
            <h2 id="detail-title"></h2>
            <span id="detail-fav-btn" class="star-btn-large">☆</span>
        </div>
        <div class="counter-container">
            <span>作った回数：</span>
            <div class="counter-controls">
                <button class="count-btn" onclick="updateCount(-1)">－</button>
                <span id="detail-cook-count" class="count-display">0</span>
                <button class="count-btn plus" onclick="updateCount(1)">＋</button>
            </div>
        </div>
        <div style="margin-bottom: 10px;">
            <span id="detail-tier-tag" class="badge"></span>
            <span id="detail-meat-tag" class="badge"></span>
        </div>
        <div class="ingredients-box">
            <strong class="section-title-ing">材料</strong>
            <ul id="detail-ingredients"></ul>
        </div>
        <div id="detail-seasoning-container"></div>
        <strong>手順</strong>
        <div id="detail-steps-list" class="steps-list"></div>
        <div id="memo-section">
            <strong>備考</strong>
            <div id="detail-memo" class="memo-box pre-wrap"></div>
        </div>
        <button id="delete-btn-detail" class="delete-detail-btn" style="margin-top:30px;">このレシピを削除</button>
    </div>

    <div id="roulette-overlay" class="overlay">
        <div class="roulette-card">
            <div id="roulette-setup">
                <p class="roulette-msg">今日のメニューは…</p>
                <div class="roulette-options-container">
                    <div class="opt-col">
                        <span class="col-title">Tier</span>
                        <label class="opt-label tier-1"><input type="checkbox" class="roulette-tier" value="1" checked> Tier1</label>
                        <label class="opt-label tier-2"><input type="checkbox" class="roulette-tier" value="2" checked> Tier2</label>
                        <label class="opt-label tier-3"><input type="checkbox" class="roulette-tier" value="3" checked> Tier3</label>
                    </div>
                    <div class="opt-col">
                        <span class="col-title">🍖肉タグ</span>
                        <label class="opt-label bg-豚"><input type="checkbox" class="roulette-meat" value="豚" checked> 豚</label>
                        <label class="opt-label bg-鶏"><input type="checkbox" class="roulette-meat" value="鶏" checked> 鶏</label>
                        <label class="opt-label bg-ひき肉"><input type="checkbox" class="roulette-meat" value="ひき肉" checked> ひき肉</label>
                        <label class="opt-label bg-その他"><input type="checkbox" class="roulette-meat" value="その他" checked> 他</label>
                    </div>
                    <div class="opt-col">
                        <span class="col-title">お気に入り</span>
                        <label class="opt-label fav-opt"><input type="checkbox" id="roulette-fav-only"> ★</label>
                    </div>
                </div>
                <button class="roulette-run-btn" onclick="startRoulette()">ルーレットを回す</button>
                <p class="close-text" onclick="closeRoulette()">閉じる</p>
            </div>
            <div id="roulette-result-area" style="display: none;">
                <p class="roulette-msg">今日のメニューは…</p>
                <div id="roulette-result" class="roulette-result-text">？？？</div>
                <div class="roulette-controls">
                    <button id="go-to-recipe-btn" class="detail-go-btn" onclick="goToRouletteRecipe()">詳細を見る</button>
                    <button class="retry-btn" onclick="resetRoulette()">もう一度</button>
                </div>
                <p class="close-text" onclick="closeRoulette()">閉じる</p>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
